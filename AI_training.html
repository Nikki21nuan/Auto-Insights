<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Copilot AI for Sales · 互动卡片版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#F4F7FB;color:#1F1F1F}
.page{display:none;min-height:100vh;padding:0 16px 30px}
.page.active{display:block;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.tb{height:6px;background:#00375A}

/* === HERO === */
.hero{text-align:center;padding:28px 0 14px}
.hero .auto-tag{display:inline-block;background:#F4811F;color:#fff;font-size:10px;font-weight:800;padding:3px 12px;border-radius:14px;letter-spacing:2px;margin-bottom:10px;text-transform:uppercase}
.hero h1{font-size:24px;color:#00375A;font-weight:900;letter-spacing:1px}
.hero .sub{font-size:13px;color:#00375A;margin-top:4px;font-weight:500}
.hero p{font-size:11px;color:#5B9BD5;margin-top:4px;font-style:italic}
.hero .tagline{font-size:9px;color:#94A3B8;letter-spacing:3px;margin-top:8px;text-transform:uppercase}

.tip{background:#00375A;color:#fff;font-size:11px;text-align:center;padding:10px;border-radius:8px;margin-bottom:12px;line-height:1.5}
.ub{background:#E8F1F8;color:#00375A;font-size:13px;font-weight:700;text-align:center;padding:10px;border-radius:8px;margin-bottom:16px}

/* === GRID === */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:380px){.grid{grid-template-columns:1fr}}
.mc{background:#fff;border:1px solid #D8E2EC;border-radius:12px;padding:12px 10px;cursor:pointer;border-left:4px solid #F4811F;position:relative;transition:transform .12s}
.mc:active{transform:scale(.97)}
.mc .nh{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.mc .n{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:7px;background:#00375A;color:#fff;font-size:13px;font-weight:800;flex-shrink:0}
.mc .t{font-size:12px;color:#00375A;font-weight:700;line-height:1.35}
.mc .pk{font-size:10px;color:#5B6770;line-height:1.4}
.mc .pk b{color:#00375A;font-weight:600}
.mc .ar{position:absolute;right:8px;top:50%;transform:translateY(-50%);color:#D0D8E0;font-size:16px}
.fn{text-align:center;font-size:10px;color:#8899A6;margin-top:16px}

/* === DETAIL PAGES === */
.bb{font-size:13px;color:#5B9BD5;font-weight:600;padding:14px 0 8px;cursor:pointer;border:none;background:none}
.bb:active{opacity:.6}
.dh{display:flex;align-items:center;gap:10px;margin:8px 0 4px}
.dh .n{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:10px;background:#F4811F;color:#fff;font-size:20px;font-weight:800;flex-shrink:0}
.dh .n.blue{background:#00375A}
.dh .n.teal{background:#00B4D8}
.dh .n.purple{background:#6C5CE7}
.dh .n.gray{background:#94A3B8}
.dh h2{font-size:18px;color:#00375A;font-weight:800;line-height:1.3}
.ds{font-size:11px;color:#8899A6;margin:4px 0 16px;padding-left:50px}

/* === CONTENT SECTIONS === */
.sec{background:#fff;border:1px solid #D8E2EC;border-radius:12px;margin-bottom:14px;position:relative;padding:16px 14px 14px 20px;overflow:hidden}
.sec .ac{position:absolute;left:0;top:0;width:5px;height:100%;border-radius:12px 0 0 12px}
.sec.blue .ac{background:#00375A}
.sec.orange .ac{background:#F4811F}
.sec.teal .ac{background:#00B4D8}
.sec.purple .ac{background:#6C5CE7}
.sec h3{font-size:14px;font-weight:700;margin-bottom:10px}
.sec.blue h3{color:#00375A}
.sec.orange h3{color:#F4811F}
.sec.teal h3{color:#00B4D8}
.sec ul{list-style:none}
.sec li{font-size:13px;line-height:1.6;padding:4px 0 4px 10px;position:relative}
.sec li::before{content:"";position:absolute;left:0;top:11px;width:4px;height:4px;border-radius:50%;background:#B0BEC5}

/* === VALUE ITEMS === */
.vi{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #F0F4F8}
.vi:last-child{border-bottom:none}
.vi .vn{width:28px;height:28px;border-radius:50%;background:#F4811F;color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.vi .vb h4{font-size:14px;color:#00375A;font-weight:700;margin-bottom:2px}
.vi .vb .vs{font-size:12px;color:#5B6770}
.vi .vb .vd{font-size:12px;color:#F4811F;font-weight:600;margin-top:2px}

/* === STEP ITEMS === */
.si{display:flex;gap:10px;align-items:flex-start;padding:10px 0}
.si .sn{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#00375A,#00B4D8);color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.si .sb h4{font-size:13px;color:#00375A;font-weight:700;margin-bottom:1px}
.si .sb p{font-size:12px;color:#5B6770}
.step-arrow-v{color:#F4811F;font-size:16px;font-weight:800;padding:2px 0;width:30px;text-align:center;margin-left:0}

/* === COMPARE === */
.cmp{border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:12px;line-height:1.6}
.cmp-bad{background:#FFF0F0;border:2px solid #E74C3C}
.cmp-bad .cl{color:#E74C3C;font-weight:800;margin-bottom:4px;font-size:13px}
.cmp-good{background:#F0FFF4;border:2px solid #27AE60}
.cmp-good .cl{color:#27AE60;font-weight:800;margin-bottom:4px;font-size:13px}
.cmp p{color:#5B6770}

/* === APPLY (适用场景) === */
.aply{background:#EBF5FB;border-radius:10px;padding:12px 14px;margin-bottom:12px}
.aply h4{font-size:12px;font-weight:700;color:#00375A;margin-bottom:6px}
.aply ul{list-style:none}
.aply li{font-size:12px;color:#5B6770;padding:3px 0 3px 14px;position:relative;line-height:1.5}
.aply li::before{content:'▸';position:absolute;left:0;color:#00B4D8;font-weight:700}

/* === PROMPT BOXES === */
.pb{background:#1E293B;border-radius:10px;padding:16px 14px 14px;margin-bottom:10px;position:relative;overflow:hidden}
.pb .pl{display:inline-block;color:#fff;font-size:10px;font-weight:800;padding:3px 10px;border-radius:0 0 6px 0;position:absolute;top:0;left:0;letter-spacing:.3px}
.pb .pl.demo{background:#F4811F}
.pb .pl.data{background:#00B4D8}
.pb .pl.formula{background:#6C5CE7}
.pb .pl.explain{background:#00B894}
.pb .pl.email{background:#E17055}
.pb .pl.meeting{background:#FDCB6E;color:#1E293B}
.pb p{color:#E2E8F0;font-size:12px;line-height:1.65;margin-top:18px;font-family:'Menlo','Courier New',monospace}

/* === KEY POINT === */
.kp{background:linear-gradient(135deg,#FFF8F0,#FEF3E2);border-left:4px solid #F4811F;border-radius:8px;padding:11px 14px;font-size:12px;color:#5B6770;line-height:1.5;margin-top:4px}
.kp strong{color:#F4811F}

/* === MOTTO (口诀/callout) === */
.mt{background:#E8F1F8;border-radius:10px;padding:11px 14px;text-align:center;font-size:12px;color:#00375A;font-weight:700;line-height:1.45;margin-top:4px}

/* === TAKEAWAY ITEMS === */
.ti{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #F0F4F8}
.ti:last-child{border-bottom:none}
.ti .tn{font-size:20px;flex-shrink:0;margin-top:2px}
.ti .tb2 h4{font-size:14px;color:#00375A;font-weight:700;margin-bottom:2px}
.ti .tb2 p{font-size:12px;color:#5B6770}

.tk-formula{background:#FFF8F0;border:2px solid #F4811F;border-radius:10px;padding:12px;text-align:center;font-size:13px;font-weight:700;color:#F4811F;margin:12px 0 10px}
.tk-closing{text-align:center;font-size:13px;color:#00375A;font-weight:600;margin-bottom:6px}
.tk-copy{text-align:center;font-size:10px;color:#94A3B8;margin-top:10px}

.bnote{font-size:11px;color:#94A3B8;text-align:center;margin-top:8px;font-style:italic}

/* === NAV DOTS === */
.nd{display:flex;justify-content:center;gap:7px;margin-top:18px}
.nd .d{width:26px;height:26px;border-radius:7px;background:#D8E2EC;color:#00375A;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;transition:all .12s}
.nd .d.on{background:#00375A;color:#fff}
.nd .d:active{transform:scale(.88)}
.sh{text-align:center;font-size:10px;color:#B0BEC5;margin-top:6px}

/* === BACK HOME FIXED === */
.back-home{position:fixed;bottom:28px;right:28px;z-index:9999;display:flex;align-items:center;gap:6px;background:rgba(0,55,90,.92);color:#fff;font-size:12px;font-weight:600;padding:10px 18px;border-radius:40px;text-decoration:none;box-shadow:0 6px 24px rgba(0,55,90,.35);backdrop-filter:blur(8px);transition:transform .2s,box-shadow .2s,background .2s}
.back-home:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(0,55,90,.45);background:rgba(0,180,216,.95)}
@media(max-width:520px){.back-home{bottom:16px;right:16px;padding:8px 14px;font-size:11px}}
</style>
</head>

<script>
var D=[
{

{

  pk:"销售每天最常用",

    +'<div class="pb"><span class="pl data">Data Prompt</span><p>帮我用这张数据做一个pivot：<br>- 按客户汇总销售金额<br>- 按产品分类统计数量<br>- 输出一个适合放在PPT里的表格</p></div>'
    +'<div class="pb"><span class="pl formula">Formula</span><p>帮我写Excel公式：判断A列料号是否存在于B表A:A，存在返回Yes，否则No。</p></div>'

    +'<div class="pb"><span class="pl demo">Demo 2</span><p>把下面这段客户情况改成PPT展示：<br>要求：<br>- 简洁一点<br>- 有逻辑（先结论再原因）<br>- 适合给Leader看</p></div>'

{

  pk:"长邮件/会议后快速提炼行动项",

  subtitle:"长邮件/会议后快速提炼行动项",

var g=document.getElementById("grid"),dc=document.getElementById("dets"),ci=-1;
var badgeColors={"blue":"blue","teal":"teal","purple":"purple","gray":"gray","":"blue"};

D.forEach(function(c,i){
  // Overview card
  var e=document.createElement("div");
  e.className="mc";
  e.onclick=function(){go(i)};
  e.innerHTML='<div class="nh"><span class="n">'+c.n+'</span><span class="t">'+c.t+'</span></div><div class="pk"><b>'+c.pk+'</b></div><span class="ar">\u203a</span>';
  g.appendChild(e);

  // Detail page
  var d=document.createElement("div");
  d.className="page";
  d.id="p-"+i;
  var dots="";
  D.forEach(function(_,j){dots+='<button class="d'+(j===i?" on":"")+'" onclick="go('+j+')">'+j+'</button>'});
  var bc=c.badge||"blue";
  d.innerHTML='<div class="tb"></div>'
    +'<button class="bb" onclick="back()">\u2190 返回总览</button>'
    +'<div class="dh"><span class="n '+bc+'">'+c.n+'</span><h2>'+c.t+'</h2></div>'
    +'<div class="ds">'+c.subtitle+'</div>'
    +c.html
    +'<div class="nd">'+dots+'</div>'
    +'<div class="sh">点击数字快速跳转 | 左右滑动切换</div>';
  dc.appendChild(d);
});

function go(i){
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active")});
  document.getElementById("p-"+i).classList.add("active");
  window.scrollTo(0,0);
  ci=i;
}
function back(){
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active")});
  document.getElementById("p-ov").classList.add("active");
  window.scrollTo(0,0);
  ci=-1;
}

// Swipe support
var sx=0;
document.addEventListener("touchstart",function(e){sx=e.changedTouches[0].screenX});
